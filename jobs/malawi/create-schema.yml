# Drops and recreates every Malawi-specific schema object (table, function,
# procedure) listed below, in this order. Each iteration runs the type-appropriate
# DROP statement and then executes the object's .sql file under
# jobs/pentaho/malawi/schema/<type>/<name>.sql.
#
# Functions and procedures use an empty delimiter so their BEGIN ... END bodies
# (which contain internal semicolons) are sent to the database as a single
# statement; tables use ";" so multi-statement DDL files (CREATE TABLE plus
# CREATE INDEX) are split correctly.
type: "iterating-job"
description: "Create Malawi schema objects (tables, functions, procedures)"
configuration:
  maxConcurrentJobs: 1
  jobTemplate:
    path: "malawi/drop-and-create-malawi-schema-object.yml"
  iterations:
    - { type: "table", name: "mw_patient", delimiter: ";" }
    - { type: "table", name: "mw_lab_tests", delimiter: ";" }
    - { type: "table", name: "mw_eid_visits", delimiter: ";" }
    - { type: "table", name: "mw_eid_register", delimiter: ";" }
    - { type: "table", name: "mw_pre_art_visits", delimiter: ";" }
    - { type: "table", name: "mw_pre_art_register", delimiter: ";" }
    - { type: "table", name: "mw_art_visits", delimiter: ";" }
    - { type: "table", name: "mw_art_register", delimiter: ";" }
    - { type: "table", name: "mw_ncd_diagnoses", delimiter: ";" }
    - { type: "table", name: "mw_ncd_visits", delimiter: ";" }
    - { type: "table", name: "mw_ncd_register", delimiter: ";" }
    - { type: "table", name: "mw_pdc_register", delimiter: ";" }
    - { type: "function", name: "first_date_no_breastfeeding", delimiter: "" }
