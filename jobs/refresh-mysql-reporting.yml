type: "job-pipeline"
description: "Refresh MySQL reporting database"
configuration:
  jobs:

    # Step 3: Derive Malawi warehouse tables from omrs_* source tables
    # Table order follows dependency chain from jobs/pentaho/malawi/schema/schema.csv
    - type: "iterating-job"
      description: "Derive Malawi warehouse tables"
      configuration:
        maxConcurrentJobs: 1
        jobTemplate:
          path: "import-warehouse-table.yml"
        iterations:
          - tableName: "mw_patient"