type: "job-pipeline"
description: "Refresh MySQL reporting database"
configuration:
  jobs:

    # Step 1: Create MySQL functions and stored procedures
    - path: "create-schema.yml"

    # Step 2: Import OpenMRS source tables into the reporting database
    - type: "iterating-job"
      description: "Import OpenMRS source tables"
      configuration:
        maxConcurrentJobs: 1
        jobTemplate:
          path: "import-openmrs-table.yml"
        iterations:
          - tableName: "mw_users"
