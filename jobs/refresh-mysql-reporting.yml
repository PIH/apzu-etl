type: "job-pipeline"
description: "Refresh MySQL reporting database"
configuration:
  jobs:

    # Step 1: Create MySQL functions and stored procedures
    - path: "create-schema.yml"

    # Step 2: Import OpenMRS source tables into the reporting database
    - type: "iterating-job"
      description: "Import OpenMRS source tables"
      configuration:
        maxConcurrentJobs: 1
        jobTemplate:
          path: "import-openmrs-table.yml"
        iterations:
          - tableName: "omrs_encounter_provider"
          - tableName: "omrs_encounter"
          - tableName: "omrs_visit"
          - tableName: "omrs_patient"
          - tableName: "omrs_patient_identifier"
          - tableName: "omrs_relationship"
          - tableName: "omrs_obs_group"
          - tableName: "omrs_obs"
          - tableName: "omrs_program_enrollment"
          - tableName: "omrs_program_state"
          - tableName: "mw_users"

    # Step 3: Derive Malawi warehouse tables from omrs_* source tables
    # Table order follows dependency chain from jobs/pentaho/malawi/schema/schema.csv
    - type: "iterating-job"
      description: "Derive Malawi warehouse tables"
      configuration:
        maxConcurrentJobs: 1
        jobTemplate:
          path: "import-warehouse-table.yml"
        iterations:
          - tableName: "mw_patient"
          - tableName: "mw_lab_tests"
          - tableName: "mw_eid_visits"
          - tableName: "mw_eid_register"
          - tableName: "mw_eid_trace"
          - tableName: "mw_pre_art_visits"
          - tableName: "mw_pre_art_register"
          - tableName: "mw_art_visits"
          - tableName: "mw_art_register"
          - tableName: "mw_art_trace"
          - tableName: "mw_ncd_diagnoses"
          - tableName: "mw_ncd_visits"
          - tableName: "mw_ncd_register"
          - tableName: "mw_pdc_register"
          - tableName: "mw_lab_tests_recent_period"
          - tableName: "mw_last_obs_in_period"
          - tableName: "mw_selected_periods"
          - tableName: "mw_concepts_selected"
          - tableName: "mw_art_regimen"
          - tableName: "mw_art_initial"
          - tableName: "mw_art_followup"
          - tableName: "mw_diabetes_hypertension_initial"
          - tableName: "mw_diabetes_hypertension_followup"
          - tableName: "mw_asthma_followup"
          - tableName: "mw_asthma_initial"
          - tableName: "mw_chf_initial"
          - tableName: "mw_chf_followup"
          - tableName: "mw_ckd_initial"
          - tableName: "mw_ckd_followup"
          - tableName: "mw_epilepsy_initial"
          - tableName: "mw_epilepsy_followup"
          - tableName: "mw_mental_health_followup"
          - tableName: "mw_mental_health_initial"
          - tableName: "mw_eid_initial"
          - tableName: "mw_eid_followup"
          - tableName: "mw_ncd_other_initial"
          - tableName: "mw_ncd_other_followup"
          - tableName: "mw_art_viral_load"
          - tableName: "mw_pdc_initial"
          - tableName: "mw_pdc_trisomy_21_followup"
          - tableName: "mw_pdc_developmental_delay_followup"
          - tableName: "mw_pdc_other_diagnosis_followup"
          - tableName: "mw_pdc_history_of_hospitalization"
          - tableName: "mw_pdc_cleft_lip_palate_followup"
          - tableName: "mw_pdc_diagnoses"
          - tableName: "mw_pdc_vision_test"
          - tableName: "mw_pdc_radiology"
          - tableName: "mw_pdc_complications"
          - tableName: "mw_pdc_hearing_test"
          - tableName: "mw_eid_lab_tests"
          - tableName: "mw_pdc_visits"
          - tableName: "mw_diabetes_hypertension_annual_lab_tests"
          - tableName: "mw_art_followup_testing"
          - tableName: "mw_nutrition_adult_initial"
          - tableName: "mw_nutrition_adult_followup"
          - tableName: "mw_nutrition_pdc_initial"
          - tableName: "mw_nutrition_pdc_followup"
          - tableName: "mw_nutrition_teen_initial"
          - tableName: "mw_nutrition_teen_followup"
          - tableName: "mw_nutrition_infant_initial"
          - tableName: "mw_nutrition_infant_followup"
          - tableName: "mw_teen_club_followup"
          - tableName: "mw_poc"
          - tableName: "mw_poc_checkin"
          - tableName: "mw_poc_clinical_plan"
          - tableName: "mw_poc_adherence_counseling"
          - tableName: "mw_poc_bp"
          - tableName: "mw_poc_cervical_cancer"
          - tableName: "mw_poc_eid"
          - tableName: "mw_poc_htc"
          - tableName: "mw_poc_nutrition"
          - tableName: "mw_poc_tb_screening"
          - tableName: "mw_poc_viral_load_screening"
          - tableName: "mw_sickle_cell_disease_initial"
          - tableName: "mw_sickle_cell_disease_quarterly_screening"
          - tableName: "mw_sickle_cell_disease_annual_screening"
          - tableName: "mw_sickle_cell_disease_history_of_hospitalization"
          - tableName: "mw_sickle_cell_disease_followup"
          - tableName: "mw_teen_club_intake_survey"
          - tableName: "mw_tb_initial"
          - tableName: "mw_tb_followup"
          - tableName: "mw_tb_post_lung_disease"
          - tableName: "mw_tb_test_results"

    # Step 4: Refresh derived MySQL tables (computed from mw_* tables)
    - type: "iterating-job"
      description: "Refresh derived MySQL tables"
      configuration:
        iterations:
          - datasourceName: "mysqlReporting"
        jobTemplate:
          path: "refresh-derived-mysql-data.yml"
