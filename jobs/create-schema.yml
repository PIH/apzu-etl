type: "job-pipeline"
description: "Create MySQL reporting schema (functions and procedures)"
configuration:
  jobs:

    - type: "iterating-job"
      description: "Create MySQL functions"
      configuration:
        jobTemplate:
          type: "sql-execution"
          description: "Create function: ${functionName}"
          configuration:
            datasource: "mysqlReporting.yml"
            delimiter: "#"
            scripts:
              - "sql/functions/${functionName}.sql"
        iterations:
          - functionName: "first_date_no_breastfeeding"
          - functionName: "first_test_result_by_date_entered"
          - functionName: "get_parent_health_facility"
          - functionName: "get_regimen"
          - functionName: "get_regimen_start"
          - functionName: "latest_asthma_visit"
          - functionName: "latest_diabetes_htn_visit"
          - functionName: "latest_epilepsy_visit"
          - functionName: "latest_mental_health_visit"
          - functionName: "latest_test_result_by_date_entered"
          - functionName: "latest_test_result_by_sample_date"

    - type: "iterating-job"
      description: "Create MySQL procedures"
      configuration:
        jobTemplate:
          type: "sql-execution"
          description: "Create procedure: ${procedureName}"
          configuration:
            datasource: "mysqlReporting.yml"
            delimiter: "#"
            scripts:
              - "sql/procedures/${procedureName}.sql"
        iterations:
          - procedureName: "create_age_groups_for_tpt"
          - procedureName: "create_age_groups"
          - procedureName: "create_changed_regimen_list"
          - procedureName: "create_chronic_care_outcome"
          - procedureName: "create_hiv_cohort"
          - procedureName: "create_last_art2_outcome_at_facility"
          - procedureName: "create_last_art_outcome_at_facility"
          - procedureName: "create_last_eid_outcome_at_facility"
          - procedureName: "create_last_eid_outcome"
          - procedureName: "create_last_mental_health_outcome_at_facility"
          - procedureName: "create_last_mental_health_outcome"
          - procedureName: "create_last_mental_program_outcome_at_facility"
          - procedureName: "create_last_ncd_outcome_at_facility"
          - procedureName: "create_last_ncd_outcome_at_facility_without_location"
          - procedureName: "create_last_ncd_outcome_without_mental_at_facility"
          - procedureName: "create_last_pdc_outcome_at_facility"
          - procedureName: "create_last_tb2_outcome_at_facility"
          - procedureName: "create_last_tb_outcome_at_facility"
          - procedureName: "create_moh_cohort_disaggregated_generic"
          - procedureName: "create_moh_cohort_disaggregated"
          - procedureName: "create_moh_tpt_initiation_generic"
          - procedureName: "create_moh_tpt_initiation"
          - procedureName: "create_moh_tx_new_generic"
          - procedureName: "create_moh_tx_new"
          - procedureName: "create_patients_next_appointment"
          - procedureName: "create_pepfar_cohort_disaggregated_generic"
          - procedureName: "create_pepfar_cohort_disaggregated"
          - procedureName: "create_pepfar_tx_hiv_htn_generic"
          - procedureName: "create_pepfar_tx_hiv_htn"
          - procedureName: "create_pepfar_tx_new_generic"
          - procedureName: "create_pepfar_tx_new"
          - procedureName: "create_pepfar_tx_tb_generic"
          - procedureName: "create_pepfar_tx_tb"
          - procedureName: "create_pepfar_tx_tml_generic"
          - procedureName: "create_pepfar_tx_tml"
          - procedureName: "create_rpt_active_art"
          - procedureName: "create_rpt_active_eid"
          - procedureName: "create_rpt_active_ncd"
          - procedureName: "create_rpt_active_pdc"
          - procedureName: "create_rpt_appt_alerts"
          - procedureName: "create_rpt_ic3_data"
          - procedureName: "create_rpt_identifiers"
          - procedureName: "create_rpt_mh_data"
          - procedureName: "create_rpt_patients_expected"
          - procedureName: "create_rpt_priority_patients"
          - procedureName: "create_rpt_trace_criteria"
          - procedureName: "create_survival_analysis_option_b"
